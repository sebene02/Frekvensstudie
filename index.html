<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frekvensstudie Dometic</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #111827;
      --primaryText: #ffffff;
      --danger: #b91c1c;
      --dangerText: #ffffff;
      --success: #16a34a;
      --info: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 1.6rem;
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 1.1rem;
    }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .btn-grid { grid-template-columns: 1fr; }
    .mini-grid { grid-template-columns: 1fr; }

    @media (min-width: 700px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .btn-grid { grid-template-columns: repeat(2, 1fr); }
      .mini-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      font-size: 1rem;
      background: white;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.08s ease, background-color 0.2s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      opacity: 0.9;
    }

    button:focus-visible {
      outline: 3px solid #94a3b8;
      outline-offset: 2px;
    }

    .btn {
      background: var(--primary);
      color: var(--primaryText);
    }

    .btn-outline {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: var(--danger);
      color: var(--dangerText);
    }

    .btn-info {
      background: var(--info);
      color: white;
    }

    .bigbtn {
      min-height: 100px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-label {
      font-size: 1rem;
      line-height: 1.2;
    }

    .btn-count {
      font-size: 0.86rem;
      font-weight: 600;
      opacity: 0.95;
      background: rgba(255,255,255,0.14);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .feedback {
      animation: flashGreen 0.3s ease;
    }

    @keyframes flashGreen {
      0% {
        background-color: var(--success);
        transform: scale(1.05);
      }
      100% {
        background-color: var(--primary);
        transform: scale(1);
      }
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tabbar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .tab {
      padding: 12px 8px;
      border-radius: 14px;
      background: white;
      border: 1px solid var(--border);
      font-weight: 700;
    }

    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .hidden { display: none; }

    .pill {
      display: inline-block;
      border: 1px solid var(--border);
      background: #f1f5f9;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.9rem;
      margin: 4px 6px 0 0;
    }

    .record {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-top: 10px;
      background: white;
    }

    .summary-chip {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
    }

    .summary-chip-title {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .summary-chip-number {
      font-size: 1.4rem;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th:first-child, td:first-child {
      white-space: normal;
    }

    .small {
      font-size: 0.9rem;
    }

    .success-text {
      color: var(--success);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Frekvensstudie Dometic</h1>
      <div class="muted">Mobilvänlig app för frekvensmätning i formning, limning och fräsning.</div>
    </div>

    <div class="grid stats">
      <div class="card"><div class="muted">Totalt</div><div class="stat-number" id="totalObs">0</div></div>
      <div class="card"><div class="muted">Aktiv station</div><div class="stat-number" id="activeStationStat" style="font-size:1.2rem;">Formning</div></div>
      <div class="card"><div class="muted">I station</div><div class="stat-number" id="stationObs">0</div></div>
    </div>

    <div class="tabbar card">
      <button class="tab active" data-tab="insamling">Insamling</button>
      <button class="tab" data-tab="jamforelse">Jämförelse</button>
      <button class="tab" data-tab="logg">Logg</button>
      <button class="tab" data-tab="installningar">Inställningar</button>
    </div>

    <section id="insamling" class="tabsection">
      <div class="card">
        <div class="grid form-grid">
          <div>
            <label for="stationSelect">Station</label>
            <select id="stationSelect"></select>
          </div>
          <div>
            <label for="observerInput">Observatör</label>
            <input id="observerInput" placeholder="Ditt namn" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Stationssummering</h2>
        <div class="grid mini-grid" id="stationTotals"></div>
      </div>

      <div class="card">
        <label for="commentInput">Kommentar</label>
        <textarea id="commentInput" placeholder="Ex. material saknas eller ruta räddas manuellt"></textarea>
        <div class="row" style="margin-top:10px;">
          <button class="btn-outline" id="undoBtn">Ångra senaste</button>
          <button class="btn-danger" id="clearBtn">Rensa all data</button>
        </div>
      </div>

      <div class="card">
        <h2>Felorsaker / kategorier</h2>
        <div class="grid btn-grid" id="categoryButtons"></div>
      </div>
    </section>

    <section id="jamforelse" class="tabsection hidden">
      <div class="card">
        <div class="row" style="margin-bottom:10px;">
          <button class="btn-info" id="copySummaryBtn">Kopiera resultat till Excel</button>
          <button class="btn-outline" id="exportSummaryBtnTop">Exportera sammanställning (CSV)</button>
        </div>
        <div id="copyStatus" class="small muted">Kopiera tabellen direkt och klistra in i Excel.</div>
      </div>

      <div class="card">
        <div class="small muted" style="margin-bottom:10px;">Jämförelse mellan stationer och felorsaker</div>
        <div style="overflow:auto;">
          <table id="summaryTable"></table>
        </div>
      </div>
    </section>

    <section id="logg" class="tabsection hidden">
      <div class="card">
        <div class="row">
          <button class="btn" id="exportObsBtn">Exportera observationer (CSV)</button>
          <button class="btn-outline" id="exportSummaryBtn">Exportera sammanställning (CSV)</button>
        </div>
      </div>
      <div id="logList"></div>
    </section>

    <section id="installningar" class="tabsection hidden">
      <div class="card">
        <label for="newStationInput">Lägg till station</label>
        <div class="row">
          <input id="newStationInput" placeholder="Ny station" />
          <button class="btn" id="addStationBtn">Lägg till</button>
        </div>
        <div id="stationPills" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <label for="newCategoryInput">Lägg till kategori</label>
        <div class="row">
          <input id="newCategoryInput" placeholder="Ny kategori" />
          <button class="btn" id="addCategoryBtn">Lägg till</button>
        </div>
        <div id="categoryPills" style="margin-top:10px;"></div>
      </div>
    </section>
  </div>

<script>
  const state = {
    stations: ["Formning", "Limning", "Fräsning"],
    categories: [
      "Rework",
      "Kantmått kort",
      "Sneborrning",
      "Limkant osymetrisk",
      "Tidslöseri material",
      "Korrekt"
    ],
    activeStation: "Formning",
    records: []
  };

  const $ = (id) => document.getElementById(id);

  function pct(part, total) {
    if (!total) return "0,0";
    return ((part / total) * 100).toFixed(1).replace(".", ",");
  }

  function nowLocal() {
    return new Date().toLocaleString("sv-SE");
  }

  function stationCount(station) {
    return state.records.filter(r => r.station === station).length;
  }

  function categoryCount(station, category) {
    return state.records.filter(r => r.station === station && r.category === category).length;
  }

  function totalCategoryCount(category) {
    return state.records.filter(r => r.category === category).length;
  }

  function refreshStationSelect() {
    const sel = $("stationSelect");
    sel.innerHTML = "";
    state.stations.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s;
      opt.textContent = s;
      sel.appendChild(opt);
    });
    sel.value = state.activeStation;
  }

  function renderPills() {
    $("stationPills").innerHTML = state.stations.map(s => `<span class="pill">${s}</span>`).join("");
    $("categoryPills").innerHTML = state.categories.map(c => `<span class="pill">${c}</span>`).join("");
  }

  function renderStationTotals() {
    const wrap = $("stationTotals");
    wrap.innerHTML = "";
    state.stations.forEach(station => {
      const div = document.createElement("div");
      div.className = "summary-chip";
      div.innerHTML = `
        <div class="summary-chip-title">${station}</div>
        <div class="summary-chip-number">${stationCount(station)}</div>
      `;
      wrap.appendChild(div);
    });
  }

  function playButtonFeedback(btn) {
    btn.classList.remove("feedback");
    void btn.offsetWidth;
    btn.classList.add("feedback");
    setTimeout(() => btn.classList.remove("feedback"), 300);
  }

  function renderCategoryButtons() {
    const wrap = $("categoryButtons");
    wrap.innerHTML = "";

    state.categories.forEach(cat => {
      const activeCount = categoryCount(state.activeStation, cat);
      const totalCount = totalCategoryCount(cat);

      const btn = document.createElement("button");
      btn.className = "btn bigbtn";
      btn.innerHTML = `
        <div class="btn-label">${cat}</div>
        <div class="btn-count">I ${state.activeStation}: ${activeCount}</div>
        <div class="btn-count">Totalt: ${totalCount}</div>
      `;

      btn.onclick = () => {
        addRecord(cat);
        playButtonFeedback(btn);
      };

      wrap.appendChild(btn);
    });
  }

  function updateStats() {
    $("totalObs").textContent = state.records.length;
    $("activeStationStat").textContent = state.activeStation;
    $("stationObs").textContent = stationCount(state.activeStation);
  }

  function renderLog() {
    const list = $("logList");
    if (state.records.length === 0) {
      list.innerHTML = `<div class="card"><div class="muted">Inga observationer ännu.</div></div>`;
      return;
    }

    list.innerHTML = state.records.map(r => `
      <div class="record">
        <div><strong>${r.station}</strong> · ${r.category}</div>
        <div class="muted">${r.localTime}</div>
        <div class="small">Observatör: ${r.observer || "Ej angiven"}</div>
        ${r.comment ? `<div class="small" style="margin-top:6px;">Kommentar: ${r.comment}</div>` : ""}
      </div>
    `).join("");
  }

  function renderSummaryTable() {
    let html = "<thead><tr><th>Felorsak / kategori</th><th>Totalt</th>";
    state.stations.forEach(s => {
      html += `<th>${s}</th><th>${s} %</th>`;
    });
    html += "</tr></thead><tbody>";

    state.categories.forEach(cat => {
      html += `<tr>`;
      html += `<td>${cat}</td>`;
      html += `<td>${totalCategoryCount(cat)}</td>`;

      state.stations.forEach(st => {
        const count = categoryCount(st, cat);
        const total = stationCount(st);
        html += `<td>${count}</td><td>${pct(count, total)} %</td>`;
      });

      html += `</tr>`;
    });

    html += `<tr style="font-weight:700;">`;
    html += `<td>Totalt per station</td>`;
    html += `<td>${state.records.length}</td>`;
    state.stations.forEach(st => {
      html += `<td>${stationCount(st)}</td><td>100,0 %</td>`;
    });
    html += `</tr>`;

    html += "</tbody>";
    $("summaryTable").innerHTML = html;
  }

  function buildSummaryRowsForExcel() {
    const rows = [];
    const header = ["Felorsak / kategori", "Totalt"];
    state.stations.forEach(st => {
      header.push(`${st} antal`);
      header.push(`${st} %`);
    });
    rows.push(header);

    state.categories.forEach(cat => {
      const row = [cat, totalCategoryCount(cat)];
      state.stations.forEach(st => {
        const count = categoryCount(st, cat);
        row.push(count);
        row.push(pct(count, stationCount(st)));
      });
      rows.push(row);
    });

    const totalRow = ["Totalt per station", state.records.length];
    state.stations.forEach(st => {
      totalRow.push(stationCount(st));
      totalRow.push("100,0");
    });
    rows.push(totalRow);

    return rows;
  }

  async function copySummaryToClipboard() {
    const rows = buildSummaryRowsForExcel();
    const text = rows.map(row => row.join("\t")).join("\n");

    try {
      await navigator.clipboard.writeText(text);
      $("copyStatus").innerHTML = `<span class="success-text">Klart:</span> resultaten är kopierade. Klistra in direkt i Excel.`;
    } catch (error) {
      $("copyStatus").textContent = "Kunde inte kopiera automatiskt i den här webbläsaren.";
    }
  }

  function addRecord(category) {
    const rec = {
      station: state.activeStation,
      category,
      comment: $("commentInput").value.trim(),
      observer: $("observerInput").value.trim(),
      localTime: nowLocal()
    };

    state.records.unshift(rec);
    $("commentInput").value = "";

    updateAll();

    if (navigator.vibrate) {
      navigator.vibrate(50);
    }
  }

  function updateAll() {
    refreshStationSelect();
    renderPills();
    renderStationTotals();
    renderCategoryButtons();
    updateStats();
    renderLog();
    renderSummaryTable();
  }

  function exportCSV(filename, rows) {
    const csv = rows.map(row => row.map(value => {
      const str = String(value ?? "");
      if (str.includes(",") || str.includes("\n") || str.includes('"')) {
        return '"' + str.replaceAll('"', '""') + '"';
      }
      return str;
    }).join(",")).join("\n");

    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function exportSummaryCSV() {
    const rows = buildSummaryRowsForExcel();
    exportCSV("frekvensstudie_sammanstallning.csv", rows);
  }

  function bindEvents() {
    document.querySelectorAll(".tab").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".tabsection").forEach(s => s.classList.add("hidden"));
        $(btn.dataset.tab).classList.remove("hidden");
      };
    });

    $("stationSelect").onchange = (e) => {
      state.activeStation = e.target.value;
      updateAll();
    };

    $("undoBtn").onclick = () => {
      state.records.shift();
      updateAll();
    };

    $("clearBtn").onclick = () => {
      state.records = [];
      updateAll();
      $("copyStatus").textContent = "Kopiera tabellen direkt och klistra in i Excel.";
    };

    $("addStationBtn").onclick = () => {
      const v = $("newStationInput").value.trim();
      if (v && !state.stations.includes(v)) {
        state.stations.push(v);
        $("newStationInput").value = "";
        updateAll();
      }
    };

    $("addCategoryBtn").onclick = () => {
      const v = $("newCategoryInput").value.trim();
      if (v && !state.categories.includes(v)) {
        state.categories.push(v);
        $("newCategoryInput").value = "";
        updateAll();
      }
    };

    $("exportObsBtn").onclick = () => {
      const rows = [
        ["Tidpunkt", "Station", "Kategori", "Kommentar", "Observatör"],
        ...state.records.slice().reverse().map(r => [
          r.localTime,
          r.station,
          r.category,
          r.comment,
          r.observer
        ])
      ];
      exportCSV("frekvensstudie_observationer.csv", rows);
    };

    $("exportSummaryBtn").onclick = exportSummaryCSV;
    $("exportSummaryBtnTop").onclick = exportSummaryCSV;
    $("copySummaryBtn").onclick = copySummaryToClipboard;
  }

  refreshStationSelect();
  bindEvents();
  updateAll();
</script>
</body>
</html>
